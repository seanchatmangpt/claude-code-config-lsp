[package]
name = "claude-code-config-lsp"
version = "26.6.24"
edition = "2021"
description = "LSP server generated by ggen + lsp-max pack — CANDIDATE"

[[bin]]
name = "claude-code-config-lsp"
path = "src/main.rs"

[lib]
name = "claude_code_config_lsp"
path = "src/lib.rs"

[dependencies]
lsp-max = "26.6.9"
lsp-types-max = "26.6.5"
lsp-max-protocol = "26.6.18"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["io-std", "io-util", "macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = "0.3"
tree-sitter = "0.26"
tree-sitter-rust = "0.23"
url = "2"