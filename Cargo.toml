[package]
name = "claude-code-config-lsp"
version = "26.6.24"
edition = "2021"
description = "LSP server generated by ggen + lsp-max pack — CANDIDATE"

[[bin]]
name = "claude-code-config-lsp"
path = "src/main.rs"

[lib]
name = "claude_code_config_lsp"
path = "src/lib.rs"

[dependencies]
lsp-max = "26.6"
lsp-types-max = { version = "26.6", features = ["proposed"] }
tree-sitter = "0.26"
tree-sitter-json = "0.23"
tokio = { version = "1", features = ["io-std", "io-util", "macros", "rt-multi-thread"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = { version = "0.4", features = ["serde"] }
blake3 = "1"
praxis = { path = "praxis", optional = true }
praxis-retrofit = { path = "praxis-retrofit", optional = true }

[features]
default = []
praxis = ["dep:praxis", "dep:praxis-retrofit"]