[project]
name        = "claude-code-config-lsp"
version     = "26.6.24"
description = "LSP server for Claude Code configuration files — generated from claude-code-config ontology"

[ontology]
source  = "schema/claude-code-config.ttl"
imports = [
    "../lsp-max/ontology/lsp318.ttl",
    "../lsp-max/ontology/max-protocol.ttl",
    "../lsp-max/ontology/law-axes.ttl",
]

[inference]
rules = [
    { name = "standard-normalization", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o }" }
]

[generation]
output_dir = "."

[[packs]]
name     = "lsp-max"
registry = "local"
path     = "../lsp-max"

# ─── Rule: cargo ─────────────────────────────────────────────────────────────

[[generation.rules]]
name        = "cargo"
query       = { inline = "SELECT (\"claude-code-config-lsp\" AS ?name) (\"26.6.24\" AS ?version) WHERE {}" }
template    = { pack = "lsp-max", output = "templates", file = "cargo.toml.tera" }
output_file = "Cargo.toml"
mode        = "Overwrite"

# ─── Rule: lib ───────────────────────────────────────────────────────────────

[[generation.rules]]
name        = "lib"
query       = { file = "sparql/modules.rq" }
template    = { pack = "lsp-max", output = "templates", file = "lib.rs.tera" }
output_file = "src/lib.rs"
mode        = "Overwrite"

# ─── Rule: main-rs ───────────────────────────────────────────────────────────

[[generation.rules]]
name        = "main-rs"
query       = { inline = "SELECT (\"ClaudeCodeConfig\" AS ?server_name) (\"claude_code_config_lsp\" AS ?snake_name) WHERE {}" }
template    = { pack = "lsp-max", output = "templates", file = "main.rs.tera" }
output_file = "src/main.rs"
mode        = "Overwrite"

# ─── Rule: backend ───────────────────────────────────────────────────────────

[[generation.rules]]
name        = "backend"
query       = { file = "sparql/handlers.rq" }
template    = { pack = "lsp-max", output = "templates", file = "backend.rs.tera" }
output_file = "src/backend.rs"
mode        = "Overwrite"
skip_empty  = false

# ─── Rule: capabilities ──────────────────────────────────────────────────────

[[generation.rules]]
name        = "capabilities"
query       = { pack = "lsp-max", output = "queries", file = "capabilities.sparql" }
template    = { pack = "lsp-max", output = "templates", file = "capabilities.rs.tera" }
output_file = "src/capabilities.rs"
mode        = "Overwrite"
skip_empty  = true

# ─── Rule: conformance ───────────────────────────────────────────────────────

[[generation.rules]]
name        = "conformance"
query       = { pack = "lsp-max", output = "queries", file = "conformance.sparql" }
template    = { pack = "lsp-max", output = "templates", file = "conformance_vector.rs.tera" }
output_file = "src/conformance.rs"
mode        = "Overwrite"
skip_empty  = true

# ─── Rule: file-types ────────────────────────────────────────────────────────

[[generation.rules]]
name        = "file-types"
query       = { file = "sparql/file_types.rq" }
template    = { pack = "lsp-max", output = "templates", file = "file_types.rs.tera" }
output_file = "src/file_types.rs"
mode        = "Overwrite"

# ─── Rule: hover ─────────────────────────────────────────────────────────────

[[generation.rules]]
name        = "hover"
query       = { file = "sparql/hover.rq" }
template    = { pack = "lsp-max", output = "templates", file = "hover.rs.tera" }
output_file = "src/hover.rs"
mode        = "Overwrite"

# ─── Rule: completion ────────────────────────────────────────────────────────

[[generation.rules]]
name        = "completion"
query       = { file = "sparql/completion.rq" }
template    = { pack = "lsp-max", output = "templates", file = "completion.rs.tera" }
output_file = "src/completion.rs"
mode        = "Overwrite"

# ─── Rule: semantic-tokens ───────────────────────────────────────────────────

[[generation.rules]]
name        = "semantic-tokens"
query       = { file = "sparql/semantic_tokens.rq" }
template    = { pack = "lsp-max", output = "templates", file = "semantic_tokens.rs.tera" }
output_file = "src/semantic_tokens.rs"
mode        = "Overwrite"

# ─── Rule: schema ────────────────────────────────────────────────────────────

[[generation.rules]]
name        = "schema"
query       = { file = "sparql/schema_fields.rq" }
template    = { pack = "lsp-max", output = "templates", file = "schema_module.rs.tera" }
output_file = "src/schema.rs"
mode        = "Overwrite"

# ─── Rule: declare-model ─────────────────────────────────────────────────────

[[generation.rules]]
name        = "declare-model"
query       = { file = "sparql/declare_constraints.rq" }
template    = { pack = "lsp-max", output = "templates", file = "declare_model.rs.tera" }
output_file = "src/declare_model.rs"
mode        = "Overwrite"

# ─── Rule: virtual-docs ──────────────────────────────────────────────────────

[[generation.rules]]
name        = "virtual-docs"
query       = { file = "sparql/virtual_docs.rq" }
template    = { pack = "lsp-max", output = "templates", file = "virtual_doc.rs.tera" }
output_file = "src/virtual_docs.rs"
mode        = "Overwrite"

# ─── Rule: ocel-accumulator ──────────────────────────────────────────────────

[[generation.rules]]
name        = "ocel-accumulator"
query       = { inline = "SELECT (\"ClaudeCodeConfig\" AS ?server_name) WHERE {}" }
template    = { pack = "lsp-max", output = "templates", file = "ocel_accumulator.rs.tera" }
output_file = "src/ocel_accumulator.rs"
mode        = "Overwrite"

# ─── Rule: analyzers-mod (module declarations for all analyzers) ─────────────

[[generation.rules]]
name        = "analyzers-mod"
query       = { file = "sparql/config_surfaces.rq" }
template    = { pack = "lsp-max", output = "templates", file = "analyzers_mod.rs.tera" }
output_file = "src/analyzers/mod.rs"
mode        = "Overwrite"

# ─── Rules: analyzers ────────────────────────────────────────────────────────
# Analyzer stubs were bootstrapped once via mode=Create on initial ggen sync.
# The files in src/analyzers/*.rs are now hand-owned — this rule is retired.
# To add a new analyzer surface: add it to schema/domain.ttl, run ggen sync
# with the rule temporarily restored, then remove this comment block again.
