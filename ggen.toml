[project]
name        = "claude-code-config-lsp"
version     = "26.6.24"
description = "LSP server for Claude Code configuration files — generated from claude-code-config ontology"

[ontology]
source        = "schema/claude-code-config.ttl"
imports       = []
standard_only = false

[inference]
rules = [
    { name = "standard-normalization", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o }" }
]

[generation]
output_dir = "."

# ─── Rule 1: main ────────────────────────────────────────────────────────────

[[generation.rules]]
name        = "main"
query       = { inline = "SELECT ?name ?version WHERE { BIND(\"claude-code-config-lsp\" AS ?name) BIND(\"26.6.24\" AS ?version) }" }
template    = { file = "/Users/sac/lsp-max/templates/lsp-max/cargo.toml.tera" }
output_file = "Cargo.toml"
mode        = "Overwrite"

# ─── Rule 2: lib ─────────────────────────────────────────────────────────────

[[generation.rules]]
name        = "lib"
query       = { inline = "SELECT ?server_name WHERE { BIND(\"ClaudeCodeConfig\" AS ?server_name) }" }
template    = { file = "/Users/sac/lsp-max/templates/lsp-max/lib.rs.tera" }
output_file = "src/lib.rs"
mode        = "Overwrite"

# ─── Rule 3: main-rs ─────────────────────────────────────────────────────────

[[generation.rules]]
name        = "main-rs"
query       = { inline = "SELECT ?server_name ?snake_name WHERE { BIND(\"ClaudeCodeConfig\" AS ?server_name) BIND(\"claude_code_config\" AS ?snake_name) }" }
template    = { file = "/Users/sac/lsp-max/templates/lsp-max/main.rs.tera" }
output_file = "src/main.rs"
mode        = "Overwrite"

# ─── Rule 4: file-types ──────────────────────────────────────────────────────

[[generation.rules]]
name        = "file-types"
query       = { inline = """
PREFIX ccc: <https://claude-code-config-lsp.rs/ontology/>
SELECT ?extension ?server_id
WHERE {
    ?surface a ccc:ConfigSurface ;
        ccc:filePattern ?extension ;
        ccc:languageId ?server_id .
}
ORDER BY ?extension
""" }
template    = { file = "/Users/sac/lsp-max/templates/lsp-max/file_types.rs.tera" }
output_file = "src/file_types.rs"
mode        = "Overwrite"

# ─── Rule 5: hover ───────────────────────────────────────────────────────────

[[generation.rules]]
